<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Screenshot — Women Safety (Mockup)</title>
  <style>
    body{margin:0;background:#f3f4f6;font-family:system-ui,Arial}
    .frame{max-width:1100px;margin:2rem auto;padding:1rem;background:#fff;border-radius:8px;box-shadow:0 8px 30px rgba(16,24,40,0.08)}
    .mock{position:relative}
    .mock img.screenshot{width:100%;height:auto;display:block;border-radius:6px}
    .mock img.logo{position:absolute;left:32px;top:24px;width:140px;height:auto;filter:drop-shadow(0 6px 18px rgba(16,24,40,0.12))}
    .caption{font-size:.95rem;color:#444;margin-top:.75rem;text-align:center}
    @media (max-width:800px){.mock img.logo{left:16px;top:12px;width:110px}}
  </style>
</head>
<body>
  <div class="container frame">
    <div class="mock">
      <!-- screenshot collage placeholder -->
      <img class="screenshot" src="assets/png/hero-800.png" alt="Site screenshot collage">
      <!-- logo overlay (uses the uploaded PNG placeholder logo) -->
      <img class="logo" src="assets/png/logo-512.png" alt="Women Safety logo">
    </div>
    <p class="caption">Mockup: screenshot collage with logo overlay. If you want the logo positioned elsewhere or exported as a single image, tell me and I can prepare instructions to generate a PNG locally or create a PR.</p>
  </div>
</body>
</html>
